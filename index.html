<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 64px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 12px; }
    p  { color: #888; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <p>This page can be replaced with your own content.</p>
  </div>
</body>
</html>
